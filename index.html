<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huoltotyöt kesken</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    padding: 40px;
}

.gear {
    width: 150px;
    animation: spin 8s linear infinite;
    margin-bottom: 20px;
}

h1 {
    font-size: 42px;
    margin: 0;
}

p {
    color: #cbd5e1;
    font-size: 18px;
    margin-top: 10px;
}

@keyframes spin {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}
</style>

</head>
<body>

<div class="container">
    <img class="gear" src="https://pngimg.com/uploads/gear/gear_PNG2.png" alt="Gear">
    
    <h1>Huoltotyöt kesken</h1>
    
    <p>Sivusto on tilapäisesti poissa käytöstä.<br>
    Palaamme pian takaisin.</p>
</div>

</body>
</html>
